  To run: serve this directory with a local HTTP server.
  Example: python3 -m http.server 8000
  Then open http://localhost:8000 in your browser.
  Opening index.html directly (file://) will block image loading.

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landon McNeil</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    color: #000000;
    font-family: 'Inter', sans-serif;
  }

  .shell {
    display: grid;
    grid-template-columns: 180px 1fr 340px;
    height: 100vh;
  }

  /* ── Left nav ── */
  .nav {
    border-right: 1px solid #000;
    padding: 24px 0 0 24px;
  }
  .nav ul { list-style: none; }
  .nav li {
    font-size: 14px;
    font-weight: 400;
    line-height: 2;
    cursor: pointer;
    white-space: nowrap;
  }
  .nav li:hover { text-decoration: underline; }
  .nav li.active::before { content: "\2192 "; }

  /* ── Center content ── */
  .content {
    padding: 32px;
    overflow-y: auto; /* resume can exceed the viewport; other tabs stay short */
  }
  #contentInner {
    transition: opacity 100ms linear;
    font-family: ui-monospace, 'Courier New', monospace;
    font-size: 14px;
  }
  #contentInner.fade-in { transition: opacity 150ms linear; }

  /* ── Resume tab ──
     Single narrow, centered column with generous negative space
     (matthewdilloncohen.nyc spirit). Switches to Inter, not monospace. */
  #contentInner.resume-view { font-family: 'Inter', sans-serif; }
  .resume {
    max-width: 560px;
    margin: 0 auto;
    padding: 8px 0 80px;
  }
  .resume__eyebrow,
  .resume__section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #000;
  }

  /* formal PDF card */
  .resume__pdf {
    border: 1px solid #000;
    padding: 22px 22px 0;
    margin-bottom: 64px;
  }
  .resume__doctitle {
    font-weight: 900;
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin: 10px 0 18px;
  }
  .resume__actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .resume__btn {
    display: inline-block;
    border: 1px solid #000;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    color: #000;
    background: #fff;
    transition: background 120ms linear, color 120ms linear;
  }
  .resume__btn:hover { background: #000; color: #fff; }
  .resume__embed {
    display: block;
    width: 100%;
    height: 520px;
    border: 1px solid #000;
    border-bottom: none;
    margin-left: -22px;
    width: calc(100% + 44px);
  }
  .resume__embed-fallback {
    padding: 24px;
    font-size: 13px;
    line-height: 1.6;
  }

  /* high-signal entries */
  .resume__section-title { margin-bottom: 28px; }
  .entry { margin-bottom: 44px; }
  .entry:last-child { margin-bottom: 0; }
  .entry__org {
    font-weight: 900;
    font-size: 19px;
    letter-spacing: -0.01em;
  }
  .entry__meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    margin: 2px 0 16px;
  }
  .entry__title { font-weight: 700; }
  .entry__dates { color: #555; white-space: nowrap; }
  .entry__lede {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin: 14px 0 8px;
  }
  .entry__list {
    list-style: none;
    font-size: 14px;
    line-height: 1.55;
  }
  .entry__list li { position: relative; padding-left: 18px; margin-bottom: 7px; }
  .entry__list li::before {
    content: "\2014"; /* em dash bullet, matches the nav arrow language */
    position: absolute;
    left: 0;
    color: #000;
  }
  .entry__sub {
    list-style: none;
    margin: 7px 0 0 0;
    font-size: 13px;
    color: #444;
  }
  .entry__sub li { padding-left: 18px; }
  .entry__sub li::before { content: "\00B7"; font-weight: 900; }
  .entry__list--skills li::before { content: "\2192"; } /* arrow for skills */

  /* ── Right column ── */
  .right {
    border-left: 1px solid #000;
    position: relative;
  }
  .name {
    text-align: right;
    padding: 24px 24px 0 0;
    font-weight: 900;
    font-size: clamp(48px, 5vw, 72px); /* capped so LANDON fits the 340px column */
    line-height: 0.88;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }

  .photo-area {
    position: absolute;
    bottom: 0;
    right: 0;
  }
  .reset-link {
    display: block;
    text-align: right;
    font-size: 12px;
    color: #000;
    text-decoration: underline;
    cursor: pointer;
    margin-bottom: 4px;
    padding-right: 4px;
    visibility: hidden; /* shown once something has been shaved */
  }
  .reset-link.visible { visibility: visible; }
  .photo-wrapper {
    position: relative;
    width: 280px;
    height: 447px;
  }
  .photo-wrapper canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ── Clipper ── */
  .clipper-container {
    position: fixed;
    z-index: 9999;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    top: 80px;
    left: calc(50vw - 30px);
    width: 60px;
    height: 150px;
    transform-origin: center center;
    touch-action: none;
  }
  .clipper-container.dragging { cursor: grabbing; }

  .handle {
    position: absolute;
    opacity: 0.35;
    transition: opacity 120ms linear;
    z-index: 2;
  }
  .clipper-container:hover .handle,
  .clipper-container.show-handles .handle { opacity: 1; }

  .rotate-handle {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #000;
    border: 1px solid #fff;
    top: -22px;
    left: calc(50% - 5px);
    cursor: alias; /* closest standard cursor to a curved rotation arrow */
  }
  .resize-handle {
    width: 8px;
    height: 8px;
    background: #000;
    right: 0;
    bottom: 0;
    cursor: nwse-resize;
  }

  .clipper-container svg { display: block; pointer-events: none; }
  .clipper-container svg.buzzing { animation: buzz 0.08s steps(1) infinite; }
  @keyframes buzz {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(1.5px, 1px); }
    50%  { transform: translate(-1px, 0); }
    75%  { transform: translate(0.5px, -1px); }
    100% { transform: translate(0, 0); }
  }

  .clipper-hint {
    position: fixed;
    z-index: 9998;
    top: 250px;
    left: calc(50vw - 90px);
    width: 200px;
    border: 1px solid #000;
    background: #fff;
    padding: 8px 10px;
    font-family: ui-monospace, 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.6;
    transition: opacity 300ms linear;
    pointer-events: none;
  }
  .clipper-hint.hidden { opacity: 0; }

  .teeth-marker {
    position: absolute;
    left: 50%;
    bottom: 30px; /* teeth row sits above the trailing cord space */
    width: 1px;
    height: 1px;
    pointer-events: none;
  }

  /* ── touch devices: bigger handles, always visible (no hover) ── */
  @media (pointer: coarse) {
    .handle { opacity: 0.6; }
    .rotate-handle { width: 18px; height: 18px; top: -32px; left: calc(50% - 9px); }
    .resize-handle { width: 16px; height: 16px; right: -4px; bottom: -4px; }
  }

  /* ── short desktop windows: allow scroll instead of crushing the layout ── */
  @media (min-width: 901px) and (max-height: 660px) {
    html, body { overflow-y: auto; }
    .shell { min-height: 660px; }
  }

  /* ── stacked layout for tablets and phones ── */
  @media (max-width: 900px) {
    html, body { overflow-y: auto; overflow-x: hidden; }

    .shell {
      display: block;
      height: auto;
    }
    .nav {
      border-right: none;
      border-bottom: 1px solid #000;
      padding: 16px 16px 12px 16px;
    }
    .nav li { display: inline-block; margin-right: 16px; line-height: 2.2; }
    .nav li.active::before { content: "\2192 "; }

    .content { padding: 24px 16px; min-height: 90px; }

    .right {
      border-left: none;
      border-top: 1px solid #000;
      position: static;
    }
    .name { padding: 16px 16px 0 0; }

    .photo-area {
      position: static;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .clipper-hint {
      top: auto;
      bottom: 16px;
      left: 16px;
    }
    .clipper-container { top: 190px; } /* clear of the nav rows */

    /* inline PDF embedding is unreliable on phones/tablets: hide the embed,
       lean on the Open / Download card affordances instead */
    .resume__embed { display: none; }
    .resume__pdf { padding-bottom: 22px; }
  }
</style>
</head>
<body>

<div class="shell">

  <nav class="nav">
    <ul id="navList" role="tablist" aria-label="Sections">
      <li class="active" role="tab" tabindex="0" aria-selected="true" aria-controls="contentInner" data-tab="Home" data-slug="home">Home</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="About Me" data-slug="about">About Me</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="Resume" data-slug="resume">Resume</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="Lucid Motors" data-slug="lucid-motors">Lucid Motors</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="BYU Racing FSAE" data-slug="byu-racing">BYU Racing FSAE</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="SO-101" data-slug="so-101">SO-101</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="B&amp;K PSU MCP" data-slug="bk-psu-mcp">B&amp;K PSU MCP</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="ElectroPuch" data-slug="electropuch">ElectroPuch</li>
    </ul>
  </nav>

  <main class="content">
    <div id="contentInner" role="tabpanel" tabindex="0">[ Welcome ]</div>
  </main>

  <aside class="right">
    <div class="name">Landon<br>McNeil</div>
    <div class="photo-area">
      <span class="reset-link" id="resetLink">&#8634; reset</span>
      <div class="photo-wrapper" id="photoWrapper">
        <canvas id="photoCanvas" width="280" height="447"></canvas>
        <canvas id="shaveCanvas" width="280" height="447"></canvas>
      </div>
    </div>
  </aside>

</div>

<!-- ── Clipper ── -->
<div class="clipper-hint" id="clipperHint">&#8593; drag the clippers onto the hair to shave<br>&#8226; scroll to resize<br>&#8226; circle handle rotates, square resizes</div>
<div class="clipper-container" id="clipper">
  <div class="handle rotate-handle" id="rotateHandle"></div>
  <div class="handle resize-handle" id="resizeHandle"></div>
  <div class="teeth-marker" id="teethMarker"></div>
  <svg id="clipperSvg" width="60" height="150" viewBox="0 0 60 150" xmlns="http://www.w3.org/2000/svg">
    <!-- power cord trailing from the bottom end, curving out behind the teeth -->
    <path d="M 16 104 C 4 114, 14 132, 8 148" stroke="#333" stroke-width="3" fill="none"/>
    <!-- body (slight 3/4 taper, rounded top) -->
    <path d="M 14 12 Q 14 4 22 4 L 38 4 Q 46 4 46 12 L 44 102 Q 44 108 38 108 L 22 108 Q 16 108 16 102 Z" fill="#1a1a1a"/>
    <!-- highlight strip along top edge -->
    <path d="M 16 7 Q 18 5 22 5 L 38 5 Q 42 5 44 7 L 44 9 Q 42 6.5 38 6.5 L 22 6.5 Q 18 6.5 16 9 Z" fill="#3d3d3d"/>
    <!-- face panel -->
    <rect x="22" y="18" width="18" height="56" fill="#2e2e2e"/>
    <!-- power button -->
    <circle cx="31" cy="32" r="4" fill="#555"/>
    <!-- side grip lines -->
    <rect x="24" y="54" width="14" height="2" fill="#1f1f1f"/>
    <rect x="24" y="60" width="14" height="2" fill="#1f1f1f"/>
    <rect x="24" y="66" width="14" height="2" fill="#1f1f1f"/>
    <!-- blade housing at the bottom (business end) -->
    <rect x="16" y="106" width="28" height="6" fill="#2a2a2a"/>
    <!-- clipper teeth: row of 8 thin rects, 4px wide x 8px tall, facing down -->
    <rect x="12" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="17" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="22" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="27" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="32" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="37" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="42" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="47" y="112" width="4" height="8" fill="#4a4a4a"/>
  </svg>
</div>

<script>
(function () {
  'use strict';

  /* ════════ TAB NAVIGATION + HASH ROUTING ════════
     Single source of truth: activateTab(slug) is the ONLY place that mutates
     the DOM/active state. Clicks (and keyboard) set location.hash; a single
     hashchange listener calls activateTab. On load we read location.hash so
     deep links (/#projects) paint the right tab on first frame. */
  var navList = document.getElementById('navList');
  var contentInner = document.getElementById('contentInner');
  var tabItems = Array.prototype.slice.call(navList.querySelectorAll('li'));

  // slug -> li, built from the markup so the HTML stays the source of truth
  var tabsBySlug = {};
  tabItems.forEach(function (li) { tabsBySlug[li.dataset.slug] = li; });
  var DEFAULT_SLUG = 'home';

  /* ── Resume content (Phase 2) ──
     PDF served from a relative, URL-safe asset path; friendly name preserved
     for downloads. High-signal entries transcribed faithfully from
     Obsidian Vault/Portfolio Website Content/Resume.md. */
  var RESUME_PDF = 'assets/landon-mcneil-resume-2026.pdf';
  var RESUME_PDF_NAME = 'Landon McNeil Resume - Robotics Test & Validation - June 2026.pdf';

  var resumeEntries = [
    {
      org: 'Lucid Motors',
      title: 'Battery Test Engineer',
      dates: 'July 2024 – Present',
      learned: [
        'That I can solve any problem and learn any skill to get the job done.',
        'To troubleshoot, troubleshoot, troubleshoot — almost nothing will work perfectly the first time.',
        'How to make both quick-turn, kludged-together test solutions, AND reusable, repeatable, and well-made ones.',
        { text: 'How to plan, coordinate, and execute complex and large-scale tests.',
          sub: ["Safely and effectively blowing up a 100+ kWh battery pack while collecting GB's of data and introducing as few 'observer effects' as possible is my bread and butter now."] }
      ],
      skills: [
        'Custom test fixture design using CATIA 3DX',
        'Data analysis and test automation using Python and AI',
        "Data acquisition and test instrumentation (in my opinion it's 50% science, 50% art)"
      ]
    },
    {
      org: 'BYU Racing',
      title: 'High Voltage Team Lead',
      dates: 'Aug 2022 – June 2024',
      learned: [
        'To ball on a budget.',
        'To lead and work with a small engineering team, rather than do everything myself.',
        'What parts of my schooling actually mattered for my future career.'
      ],
      skills: [
        'Leading a focused team',
        'Working through a full product design cycle (Ideation → Design → Build → Test)',
        'High voltage design and handling',
        'DFM'
      ]
    },
    {
      org: 'Hypercraft',
      title: 'Battery Engineering Intern',
      dates: 'Nov 2023 – May 2024',
      learned: [
        "What it's like to work at a scrappy, strapped startup.",
        'How to take a complex system from CAD to IRL.',
        'About batteries in the real world — how much they cost, how you handle them, how to connect them together, and what the design tradeoffs are for custom battery packs.'
      ],
      skills: [
        'Using Solidworks for complex part and assembly design'
      ]
    },
    {
      org: 'Wheeler Research Group',
      title: 'Li-ion Battery Research Assistant',
      dates: 'Sept 2022 – June 2024',
      learned: [
        'The meaning of “kludge.”',
        'Most of what I know about battery electrochemistry.',
        'Research rigor and to keep trying new ideas as quickly as possible.'
      ],
      skills: [
        'Making whatever materials and equipment were on-hand go a lot further than their intended uses',
        'Manual machining and fabrication'
      ]
    }
  ];

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function buildResumeHTML() {
    var html = '<div class="resume">';

    // formal PDF — card with Open/Download + inline preview (hidden on mobile)
    html += '<section class="resume__pdf">'
      + '<p class="resume__eyebrow">Formal résumé</p>'
      + '<h2 class="resume__doctitle">Robotics Test &amp; Validation<br>June 2026</h2>'
      + '<div class="resume__actions">'
      + '<a class="resume__btn" href="' + esc(RESUME_PDF) + '" target="_blank" rel="noopener">Open ↗</a>'
      + '<a class="resume__btn" href="' + esc(RESUME_PDF) + '" download="' + esc(RESUME_PDF_NAME) + '">Download ↓</a>'
      + '</div>'
      + '<object class="resume__embed" data="' + esc(RESUME_PDF) + '#view=FitH" type="application/pdf" aria-label="Resume PDF preview">'
      + '<p class="resume__embed-fallback">Your browser can’t show the PDF here — use Open or Download above.</p>'
      + '</object>'
      + '</section>';

    // high-signal entries
    html += '<section class="resume__entries">'
      + '<h2 class="resume__section-title">High-signal background</h2>';
    resumeEntries.forEach(function (e) {
      html += '<article class="entry">'
        + '<h3 class="entry__org">' + esc(e.org) + '</h3>'
        + '<p class="entry__meta"><span class="entry__title">' + esc(e.title) + '</span>'
        + '<span class="entry__dates">' + esc(e.dates) + '</span></p>'
        + '<p class="entry__lede">The job where I learned…</p>'
        + '<ul class="entry__list">';
      e.learned.forEach(function (item) {
        if (typeof item === 'string') {
          html += '<li>' + esc(item) + '</li>';
        } else {
          html += '<li>' + esc(item.text) + '<ul class="entry__sub">';
          item.sub.forEach(function (s) { html += '<li>' + esc(s) + '</li>'; });
          html += '</ul></li>';
        }
      });
      html += '</ul>'
        + '<p class="entry__lede">Key skills</p>'
        + '<ul class="entry__list entry__list--skills">';
      e.skills.forEach(function (s) { html += '<li>' + esc(s) + '</li>'; });
      html += '</ul></article>';
    });
    html += '</section></div>';

    return html;
  }

  function slugFromHash() {
    var s = (location.hash || '').replace(/^#/, '').toLowerCase();
    return tabsBySlug[s] ? s : DEFAULT_SLUG;
  }

  var currentSlug = null;

  function activateTab(slug, animate) {
    if (!tabsBySlug[slug]) slug = DEFAULT_SLUG;
    if (slug === currentSlug) return;
    currentSlug = slug;

    var li = tabsBySlug[slug];
    tabItems.forEach(function (n) {
      var on = n === li;
      n.classList.toggle('active', on);
      n.setAttribute('aria-selected', on ? 'true' : 'false');
      n.tabIndex = on ? 0 : -1;
    });

    var tab = li.dataset.tab;
    document.title = slug === DEFAULT_SLUG
      ? 'Landon McNeil'
      : 'Landon McNeil — ' + tab;

    function paint() {
      if (slug === 'resume') {
        contentInner.classList.add('resume-view');
        contentInner.innerHTML = buildResumeHTML();
      } else {
        contentInner.classList.remove('resume-view');
        contentInner.textContent = slug === DEFAULT_SLUG
          ? '[ Welcome ]'
          : '[ ' + tab + ' — content coming soon ]';
      }
      if (contentInner.parentElement) contentInner.parentElement.scrollTop = 0;
      contentInner.classList.add('fade-in');
      contentInner.style.opacity = '1';
    }

    if (animate === false) {
      paint();
    } else {
      contentInner.classList.remove('fade-in');
      contentInner.style.opacity = '0';
      setTimeout(paint, 100);
    }
  }

  // Clicks update the hash only; hashchange does the activation (no double work).
  // Setting location.hash to a slug that is NOT an element id => no scroll jump.
  navList.addEventListener('click', function (e) {
    var li = e.target.closest('li');
    if (!li) return;
    var slug = li.dataset.slug;
    if (slug === currentSlug) return;
    if (slug === DEFAULT_SLUG) {
      // keep the URL clean for the default tab, but still re-sync
      history.pushState(null, '', location.pathname + location.search);
      activateTab(slug, true);
    } else {
      location.hash = slug;
    }
  });

  // Roving-tabindex keyboard support across the tablist.
  navList.addEventListener('keydown', function (e) {
    var li = e.target.closest('li');
    if (!li) return;
    var idx = tabItems.indexOf(li);
    var next = null;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') next = tabItems[(idx + 1) % tabItems.length];
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') next = tabItems[(idx - 1 + tabItems.length) % tabItems.length];
    else if (e.key === 'Home') next = tabItems[0];
    else if (e.key === 'End') next = tabItems[tabItems.length - 1];
    else if (e.key === 'Enter' || e.key === ' ') { li.click(); e.preventDefault(); return; }
    if (next) {
      e.preventDefault();
      next.focus();
    }
  });

  window.addEventListener('hashchange', function () {
    activateTab(slugFromHash(), true);
  });

  // First paint: honor a deep link, fall back to default. No animation so the
  // correct tab is up immediately with no flicker.
  activateTab(slugFromHash(), false);

  /* ════════ PHOTO CANVASES ════════ */
  var photoCanvas = document.getElementById('photoCanvas');
  var shaveCanvas = document.getElementById('shaveCanvas');
  var photoCtx = photoCanvas.getContext('2d');
  var shaveCtx = shaveCanvas.getContext('2d');
  var photoWrapper = document.getElementById('photoWrapper');

  var img = new Image();
  img.onload = function () {
    photoCtx.drawImage(img, 0, 0, photoCanvas.width, photoCanvas.height);
  };
  img.onerror = function () {
    photoCtx.font = '12px monospace';
    photoCtx.fillText('[ photo failed to load — serve via http ]', 8, 24);
  };
  img.src = '00%20Home%20Page/me_with_hair-removebg.png';

  /* ── shaveable mask: hair and mustache only ──
     Hair polygon traced from the photo in 280x447 canvas space:
     outer edge follows the head silhouette, inner edge follows the hairline. */
  var hairOutline = [
    // outer edge: up the left side, over the crown, down the right side
    [96,174],[95,160],[95,140],[96,128],[98,116],[101,106],[105,98],[110,90],
    [116,84],[124,79],[133,75],[143,72],[153,71],[163,72],[172,75],[180,79],
    [188,84],[200,88],[210,94],[216,100],[220,107],[221,118],[222,130],[223,142],
    [224,154],[224,164],[223,172],[222,182],[220,192],[218,201],
    // inner edge: up the right sideburn, across the hairline, down the left sideburn
    // (dips lower on the left to cover the light-blond fringe at the temple)
    [208,201],[207,192],[206,184],[205,176],[203,165],[201,150],[198,133],[194,124],
    [189,118],[184,114],[178,111],
    [170,109],[160,108],[150,108],[142,109],[138,112],[132,118],[126,126],[120,133],
    [115,138],[112,148],[110,158],[108,166],[106,174]
  ];
  var shaveMask = new Path2D();
  shaveMask.moveTo(hairOutline[0][0], hairOutline[0][1]);
  for (var hp = 1; hp < hairOutline.length; hp++) {
    shaveMask.lineTo(hairOutline[hp][0], hairOutline[hp][1]);
  }
  shaveMask.closePath();
  shaveMask.ellipse(158, 206, 25, 9, 0, 0, Math.PI * 2);    // mustache

  // total shaveable pixel count, measured once for the shine threshold
  var maskArea = (function () {
    var m = document.createElement('canvas');
    m.width = shaveCanvas.width; m.height = shaveCanvas.height;
    var mc = m.getContext('2d');
    mc.fill(shaveMask);
    var d = mc.getImageData(0, 0, m.width, m.height).data;
    var n = 0;
    for (var i = 3; i < d.length; i += 4) if (d[i] > 0) n++;
    return n;
  })();

  /* ── completion state: clean shave + sparkle once the whole mask is filled ── */
  var SKIN = '#E9C4B2'; // sampled from the photo's forehead/temple
  var shaveComplete = false;
  var strokesSinceCheck = 0;

  function drawSparkle(cx, cy, R, color) {
    var i = R * 0.16; // concave waist of the 4-point star
    shaveCtx.beginPath();
    shaveCtx.moveTo(cx, cy - R);
    shaveCtx.quadraticCurveTo(cx + i, cy - i, cx + R, cy);
    shaveCtx.quadraticCurveTo(cx + i, cy + i, cx, cy + R);
    shaveCtx.quadraticCurveTo(cx - i, cy + i, cx - R, cy);
    shaveCtx.quadraticCurveTo(cx - i, cy - i, cx, cy - R);
    shaveCtx.fillStyle = color;
    shaveCtx.fill();
  }

  function finishShave() {
    // wipe the speckled strokes, lay down smooth skin over the whole mask
    shaveCtx.clearRect(0, 0, shaveCanvas.width, shaveCanvas.height);
    shaveCtx.save();
    shaveCtx.clip(shaveMask);
    shaveCtx.fillStyle = SKIN;
    shaveCtx.fillRect(0, 0, shaveCanvas.width, shaveCanvas.height);
    shaveCtx.restore();
    // gold shine sparkles on the crown
    drawSparkle(162, 92, 16, '#FFC83D');
    drawSparkle(190, 108, 8, '#FFC83D');
    shaveComplete = true;
  }

  function maybeFinishShave() {
    if (shaveComplete) return;
    strokesSinceCheck++;
    if (strokesSinceCheck < 15) return;
    strokesSinceCheck = 0;
    var data = shaveCtx.getImageData(0, 0, shaveCanvas.width, shaveCanvas.height).data;
    var painted = 0;
    for (var i = 3; i < data.length; i += 4) {
      if (data[i] > 0) painted++;
    }
    if (painted / maskArea > 0.92) finishShave();
  }

  var resetLink = document.getElementById('resetLink');

  function resetShave() {
    shaveCtx.clearRect(0, 0, shaveCanvas.width, shaveCanvas.height);
    shaveComplete = false;
    strokesSinceCheck = 0;
    resetLink.classList.remove('visible');
  }

  resetLink.addEventListener('click', resetShave);
  photoWrapper.addEventListener('dblclick', resetShave);

  /* ── shave stroke (WarioWare-style: skin base + stubble) ── */
  function shaveStamp(cx, cy, scale) {
    if (shaveComplete) return; // head is clean — nothing left to buzz
    var r = 10 * scale;

    if (shaveCtx.isPointInPath(shaveMask, cx, cy)) {
      resetLink.classList.add('visible'); // only once hair is actually shaved
    }
    shaveCtx.save();
    shaveCtx.clip(shaveMask); // strokes only land on hair / mustache

    // PASS 1 — skin base
    var jx = (Math.random() - 0.5) * 4;
    var jy = (Math.random() - 0.5) * 4;
    shaveCtx.globalCompositeOperation = 'source-over';
    shaveCtx.beginPath();
    shaveCtx.arc(cx + jx, cy + jy, r, 0, Math.PI * 2);
    shaveCtx.fillStyle = SKIN;
    shaveCtx.fill();

    // PASS 2 — stubble dots
    var dots = 12 + Math.floor(Math.random() * 5);
    shaveCtx.fillStyle = 'rgba(74, 55, 40, 0.45)';
    for (var i = 0; i < dots; i++) {
      var ang = Math.random() * Math.PI * 2;
      var dist = Math.sqrt(Math.random()) * r;
      var dr = 0.8 + Math.random() * 1.2;
      shaveCtx.beginPath();
      shaveCtx.arc(cx + Math.cos(ang) * dist, cy + Math.sin(ang) * dist, dr, 0, Math.PI * 2);
      shaveCtx.fill();
    }
    shaveCtx.restore();

    // PASS 3 — completion check (clean skin + sparkle, fires once)
    maybeFinishShave();
  }

  /* ════════ CLIPPER ════════ */
  var clipper = document.getElementById('clipper');
  var clipperSvg = document.getElementById('clipperSvg');
  var rotateHandle = document.getElementById('rotateHandle');
  var resizeHandle = document.getElementById('resizeHandle');
  var teethMarker = document.getElementById('teethMarker');

  var t = { x: 0, y: 0, angleDeg: 0, scale: 1 };

  /* hint disappears after the first interaction with the clipper */
  var hint = document.getElementById('clipperHint');
  function dismissHint() {
    if (hint) { hint.classList.add('hidden'); hint = null; }
  }
  clipper.addEventListener('pointerdown', dismissHint);
  clipper.addEventListener('wheel', dismissHint);

  function applyTransform() {
    clipper.style.transform =
      'translate(' + t.x + 'px, ' + t.y + 'px) rotate(' + t.angleDeg + 'deg) scale(' + t.scale + ')';
  }

  function clipperCenter() {
    var r = clipper.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  /* ── teeth contact point (transform-aware via marker element) ── */
  function teethPoint() {
    var r = teethMarker.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  var prevTeeth = null;

  function setBuzzing(on) {
    clipperSvg.classList.toggle('buzzing', on);
  }

  function tryShave() {
    var pt = teethPoint();
    var wrap = photoWrapper.getBoundingClientRect();
    var inside = pt.x >= wrap.left && pt.x <= wrap.right &&
                 pt.y >= wrap.top && pt.y <= wrap.bottom;
    setBuzzing(inside);
    if (!inside) { prevTeeth = null; return; }

    // canvas pixel coords (canvas size === css size here)
    var cx = pt.x - wrap.left;
    var cy = pt.y - wrap.top;

    // interpolate from previous point so fast drags leave no gaps
    if (prevTeeth) {
      var dx = cx - prevTeeth.x, dy = cy - prevTeeth.y;
      var dist = Math.hypot(dx, dy);
      var steps = Math.max(1, Math.floor(dist / 6));
      for (var i = 1; i <= steps; i++) {
        shaveStamp(prevTeeth.x + dx * i / steps, prevTeeth.y + dy * i / steps, t.scale);
      }
    } else {
      shaveStamp(cx, cy, t.scale);
    }
    prevTeeth = { x: cx, y: cy };
  }

  /* ── translate (drag) ── */
  var drag = null; // { mode: 'move'|'rotate'|'scale', ... }

  clipper.addEventListener('pointerdown', function (e) {
    if (e.target === rotateHandle || e.target === resizeHandle) return;
    e.preventDefault();
    drag = { mode: 'move', startX: e.clientX, startY: e.clientY, baseX: t.x, baseY: t.y };
    clipper.classList.add('dragging');
    prevTeeth = null;
  });

  rotateHandle.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    var c = clipperCenter();
    var startAngle = Math.atan2(e.clientY - c.y, e.clientX - c.x) * 180 / Math.PI;
    drag = { mode: 'rotate', center: c, startAngle: startAngle, baseAngle: t.angleDeg };
    clipper.classList.add('show-handles');
  });

  resizeHandle.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    var c = clipperCenter();
    var startDist = Math.hypot(e.clientX - c.x, e.clientY - c.y);
    drag = { mode: 'scale', center: c, startDist: Math.max(startDist, 1), baseScale: t.scale };
    clipper.classList.add('show-handles');
  });

  document.addEventListener('pointermove', function (e) {
    if (!drag) return;
    if (drag.mode === 'move') {
      t.x = drag.baseX + (e.clientX - drag.startX);
      t.y = drag.baseY + (e.clientY - drag.startY);
      applyTransform();
      tryShave();
    } else if (drag.mode === 'rotate') {
      var a = Math.atan2(e.clientY - drag.center.y, e.clientX - drag.center.x) * 180 / Math.PI;
      t.angleDeg = drag.baseAngle + (a - drag.startAngle);
      applyTransform();
    } else if (drag.mode === 'scale') {
      var d = Math.hypot(e.clientX - drag.center.x, e.clientY - drag.center.y);
      t.scale = Math.min(3.0, Math.max(0.4, drag.baseScale * (d / drag.startDist)));
      applyTransform();
    }
  });

  function endDrag() {
    if (!drag) return;
    drag = null;
    clipper.classList.remove('dragging', 'show-handles');
    setBuzzing(false);
    prevTeeth = null;
  }
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  /* ── scroll to resize ── */
  clipper.addEventListener('wheel', function (e) {
    e.preventDefault();
    var dir = e.deltaY > 0 ? -1 : 1;
    t.scale = Math.min(3.0, Math.max(0.4, t.scale + dir * 0.08));
    applyTransform();
  }, { passive: false });

  applyTransform();
})();
</script>
</body>
</html>
