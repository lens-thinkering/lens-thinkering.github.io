  To run: serve this directory with a local HTTP server.
  Example: python3 -m http.server 8000
  Then open http://localhost:8000 in your browser.
  Opening index.html directly (file://) will block image loading.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landon McNeil</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #ffffff;
    color: #000000;
    font-family: 'Inter', sans-serif;
  }

  .shell {
    display: grid;
    grid-template-columns: 180px 1fr 340px;
    height: 100vh;
  }

  /* ── Left nav ── */
  .nav {
    border-right: 1px solid #000;
    padding: 24px 0 0 24px;
  }
  .nav ul { list-style: none; }
  .nav li {
    font-size: 14px;
    font-weight: 400;
    line-height: 2;
    cursor: pointer;
    white-space: nowrap;
  }
  .nav li:hover { text-decoration: underline; }
  .nav li.active::before { content: "\2192 "; }

  /* ── Center content ── */
  .content {
    padding: 32px;
    overflow-y: auto; /* resume can exceed the viewport; other tabs stay short */
  }
  #contentInner {
    transition: opacity 100ms linear;
    font-family: ui-monospace, 'Courier New', monospace;
    font-size: 14px;
  }
  #contentInner.fade-in { transition: opacity 150ms linear; }

  /* ── Resume tab ──
     Single narrow, centered column with generous negative space
     (matthewdilloncohen.nyc spirit). Switches to Inter, not monospace. */
  #contentInner.resume-view { font-family: 'Inter', sans-serif; }
  .resume {
    max-width: 560px;
    margin: 0 auto;
    padding: 8px 0 80px;
  }
  .resume__eyebrow,
  .resume__section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #000;
  }

  /* formal PDF card */
  .resume__pdf {
    border: 1px solid #000;
    padding: 22px 22px 0;
    margin-bottom: 64px;
  }
  .resume__doctitle {
    font-weight: 900;
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin: 10px 0 18px;
  }
  .resume__actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .resume__btn {
    display: inline-block;
    border: 1px solid #000;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    color: #000;
    background: #fff;
    transition: background 120ms linear, color 120ms linear;
  }
  .resume__btn:hover { background: #000; color: #fff; }
  .resume__embed {
    display: block;
    width: 100%;
    height: 520px;
    border: 1px solid #000;
    border-bottom: none;
    margin-left: -22px;
    width: calc(100% + 44px);
  }
  .resume__embed-fallback {
    padding: 24px;
    font-size: 13px;
    line-height: 1.6;
  }

  /* profile links */
  .resume__links { margin-bottom: 64px; }
  .resume__links .resume__actions { margin-bottom: 0; }

  /* high-signal entries */
  .resume__section-title { margin-bottom: 28px; }
  .entry { margin-bottom: 44px; }
  .entry:last-child { margin-bottom: 0; }
  .entry__org {
    font-weight: 900;
    font-size: 19px;
    letter-spacing: -0.01em;
  }
  .entry__meta {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 13px;
    margin: 2px 0 16px;
  }
  .entry__title { font-weight: 700; }
  .entry__dates { color: #555; white-space: nowrap; }
  .entry__lede {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin: 14px 0 8px;
  }
  .entry__list {
    list-style: none;
    font-size: 14px;
    line-height: 1.55;
  }
  .entry__list li { position: relative; padding-left: 18px; margin-bottom: 7px; }
  .entry__list li::before {
    content: "\2014"; /* em dash bullet, matches the nav arrow language */
    position: absolute;
    left: 0;
    color: #000;
  }
  .entry__sub {
    list-style: none;
    margin: 7px 0 0 0;
    font-size: 13px;
    color: #444;
  }
  .entry__sub li { padding-left: 18px; }
  .entry__sub li::before { content: "\00B7"; font-weight: 900; }
  .entry__list--skills li::before { content: "\2192"; } /* arrow for skills */

  /* ── About Me page (reuses the .resume centered column + Inter font) ── */
  .about__intro {
    font-weight: 900;
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin: 0 0 22px;
  }
  .about__subhead {
    font-weight: 900;
    font-size: 17px;
    letter-spacing: -0.01em;
    margin: 8px 0 16px;
  }
  .about__p {
    font-size: 15px;
    line-height: 1.6;
    margin: 0 0 18px;
  }
  .about__p a { color: #1a56db; text-decoration: underline; }
  .about__p a:hover { color: #1e40af; }
  .about__rule {
    border: none;
    border-top: 1px solid #000;
    margin: 0 0 24px;
  }
  .about__figure {
    margin: 8px 0 28px;
  }
  .about__img {
    display: block;
    width: 100%;
    height: auto;
    border: 1px solid #000;
    margin: 8px 0 28px;
  }
  .about__figure .about__img { margin: 0; }
  .about__caption {
    font-size: 13px;
    line-height: 1.4;
    color: #555;
    margin-top: 8px;
  }
  .about__gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .about__gallery .about__img { margin: 0; }

  /* ── Lucid Motors page (reuses .about__* + .entry__list bullets) ── */
  /* the two portrait respirator selfies are tall; cap + center them so they
     read smaller next to the landscape first shot */
  .about__gallery .about__img--short {
    width: auto;
    max-width: 100%;
    max-height: 150px;
    justify-self: center;
  }
  .lucid__section {
    font-weight: 900;
    font-size: 17px;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin: 34px 0 12px;
  }
  .lucid__duo {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin: 8px 0 28px;
  }
  .lucid__duo .about__figure { margin: 0; }

  /* ── Highlights (landing page) ──
     2-col card grid: uniform 4:3 image crops so portrait and landscape shots
     sit at the same size, title + short pitch below each. */
  .hl__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px 16px;
    margin: 8px 0 28px;
  }
  .hl__img-link { display: block; color: inherit; text-decoration: none; }
  .hl__card .about__img {
    aspect-ratio: 4 / 3;
    object-fit: cover;
    margin: 0;
  }
  .hl__title {
    font-weight: 900;
    font-size: 15px;
    line-height: 1.25;
    letter-spacing: -0.01em;
    margin: 10px 0 4px;
  }
  .hl__title a { color: inherit; }
  .hl__pitch { font-size: 13px; line-height: 1.5; margin: 0; }
  .hl__pitch a { color: #1a56db; text-decoration: underline; }
  .hl__pitch a:hover { color: #1e40af; }
  .lucid__video {
    border: 1px solid #000;
    margin: 8px 0 8px;
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
  }
  .lucid__video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .lucid__video-cap { margin: 0 0 28px; }
  /* Opaque cover shown until the embed actually reaches PLAYING. If YouTube
     refuses the inline embed (error 150/153 etc.) the cover simply stays, as a
     clean clickable link — visitors never see YouTube's raw error box. */
  .lucid__video-cover {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #000;
    color: #fff;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
  }
  .lucid__video-cover:hover { text-decoration: underline; }
  .lucid__video-play {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border: 2px solid #fff;
    border-radius: 50%;
    font-size: 15px;
    padding-left: 3px; /* optically center the triangle */
  }

  /* ── BYU Racing video facades ──
     Click-to-load YouTube: show a poster + play button, swap in the iframe on
     first click so YouTube isn't loaded until the visitor wants it. */
  .byu__video {
    border: 1px solid #000;
    margin: 8px 0 8px;
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    cursor: pointer;
    overflow: hidden;
  }
  .byu__video--portrait {
    aspect-ratio: 9 / 16;
    max-width: 340px;
    margin-left: auto;
    margin-right: auto;
  }
  .byu__video-poster {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .byu__video-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border: 2px solid #fff;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.55);
    color: #fff;
    font-size: 20px;
    padding-left: 4px; /* optically center the triangle */
  }
  .byu__video:hover .byu__video-play { background: rgba(0, 0, 0, 0.85); }
  .byu__video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .byu__video-cap { margin: 0 0 28px; }

  /* Embedded Google Sheet (ElectroPuch BOM): bordered, full-width, fixed height,
     with custom +/- zoom (the /preview embed has no native zoom). The iframe is
     CSS-scaled inside a scrollable frame; width/height stay at 100/scale % so the
     scaled content always fills the frame and stays responsive. */
  .electropuch__zoom {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
  }
  .electropuch__zoom-btn {
    font: inherit;
    width: 30px;
    height: 30px;
    line-height: 1;
    border: 1px solid #000;
    background: #fff;
    cursor: pointer;
    border-radius: 4px;
  }
  .electropuch__zoom-btn:hover { background: #000; color: #fff; }
  .electropuch__zoom-btn:disabled { opacity: 0.4; cursor: default; background: #fff; color: inherit; }
  .electropuch__zoom-level { font-size: 14px; min-width: 46px; text-align: center; }
  .electropuch__sheet-frame {
    width: 100%;
    height: 460px;
    border: 1px solid #000;
    overflow: auto;
    margin: 0 0 28px;
    background: #fff;
  }
  .electropuch__sheet {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
    transform-origin: 0 0;
  }

  /* Click-to-expand image + its full-screen lightbox overlay. */
  .electropuch__expandable { cursor: zoom-in; }
  .electropuch__lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.88);
    cursor: zoom-out;
  }
  .electropuch__lightbox.is-open { display: flex; }
  .electropuch__lightbox img {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 0 0 1px #000;
  }

  /* ── Right column ── */
  .right {
    border-left: 1px solid #000;
    position: relative;
  }
  .name {
    text-align: right;
    padding: 24px 24px 0 0;
    font-weight: 900;
    font-size: clamp(48px, 5vw, 72px); /* capped so LANDON fits the 340px column */
    line-height: 0.88;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }

  .photo-area {
    position: absolute;
    bottom: 0;
    right: 0;
  }
  .reset-link {
    display: block;
    text-align: right;
    font-size: 12px;
    color: #000;
    text-decoration: underline;
    cursor: pointer;
    margin-bottom: 4px;
    padding-right: 4px;
    visibility: hidden; /* shown once something has been shaved */
  }
  .reset-link.visible { visibility: visible; }
  .photo-wrapper {
    position: relative;
    width: 280px;
    height: 447px;
  }
  .photo-wrapper canvas {
    position: absolute;
    top: 0;
    left: 0;
  }

  /* ── Clipper ── */
  .clipper-container {
    position: fixed;
    z-index: 9999;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
    /* base position approximates where positionClipperBesideHead() lands
       (teeth just left of the head), so the clipper never flashes mid-screen
       before the JS anchors it and sits by the photo even without JS */
    bottom: 277px;
    right: 260px;
    width: 60px;
    height: 150px;
    transform-origin: center center;
    touch-action: none;
  }
  .clipper-container.dragging { cursor: grabbing; }

  .handle {
    position: absolute;
    opacity: 0.35;
    transition: opacity 120ms linear;
    z-index: 2;
  }
  .clipper-container:hover .handle,
  .clipper-container.show-handles .handle { opacity: 1; }

  .rotate-handle {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #000;
    border: 1px solid #fff;
    top: -22px;
    left: calc(50% - 5px);
    cursor: alias; /* closest standard cursor to a curved rotation arrow */
  }
  .resize-handle {
    width: 8px;
    height: 8px;
    background: #000;
    right: 0;
    bottom: 0;
    cursor: nwse-resize;
  }

  .clipper-container svg { display: block; pointer-events: none; }
  .clipper-container svg.buzzing { animation: buzz 0.08s steps(1) infinite; }
  @keyframes buzz {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(1.5px, 1px); }
    50%  { transform: translate(-1px, 0); }
    75%  { transform: translate(0.5px, -1px); }
    100% { transform: translate(0, 0); }
  }

  /* lives inside the photo area, directly above the picture, so the hint and
     the clippers both greet the visitor in the same corner; right-aligned to
     match the name + photo column */
  .clipper-hint {
    width: 200px;
    margin: 0 4px 8px auto;
    border: 1px solid #000;
    background: #fff;
    padding: 8px 10px;
    font-family: ui-monospace, 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.6;
    transition: opacity 300ms linear;
    pointer-events: none;
  }
  .clipper-hint.hidden { opacity: 0; }

  .teeth-marker {
    position: absolute;
    left: 50%;
    bottom: 30px; /* teeth row sits above the trailing cord space */
    width: 1px;
    height: 1px;
    pointer-events: none;
  }

  /* ── touch devices: bigger handles, always visible (no hover) ── */
  @media (pointer: coarse) {
    .handle { opacity: 0.6; }
    .rotate-handle { width: 18px; height: 18px; top: -32px; left: calc(50% - 9px); }
    .resize-handle { width: 16px; height: 16px; right: -4px; bottom: -4px; }
  }

  /* ── short desktop windows: allow scroll instead of crushing the layout ── */
  @media (min-width: 901px) and (max-height: 660px) {
    html, body { overflow-y: auto; }
    .shell { min-height: 660px; }
  }

  /* ── stacked layout for tablets and phones ── */
  @media (max-width: 900px) {
    /* Scroll as a normal document, not the fixed 100vh app-shell the desktop
       layout uses. The base rule pins html/body to height:100% with
       overflow:hidden; if we only flip overflow (and leave height:100%), the
       body stays locked to one viewport while content overflows it, creating a
       fragile body-level scroll. The absolutely-positioned clipper (anchored to
       the document) then can't track that scroll and ends up unreachable beside
       the bottom photo, and a ResizeObserver on body never fires because body's
       box never grows. height:auto lets the page flow and scroll normally. */
    html, body { height: auto; min-height: 100%; overflow-y: auto; overflow-x: hidden; }

    .shell {
      display: block;
      height: auto;
    }
    /* no nested scroll context on mobile — the whole document scrolls */
    .content { overflow: visible; }
    .nav {
      border-right: none;
      border-bottom: 1px solid #000;
      padding: 16px 16px 12px 16px;
    }
    .nav li { display: inline-block; margin-right: 16px; line-height: 2.2; }
    .nav li.active::before { content: "\2192 "; }

    .content { padding: 24px 16px; min-height: 90px; }

    .right {
      border-left: none;
      border-top: 1px solid #000;
      position: static;
    }
    .name { padding: 16px 16px 0 0; }

    .photo-area {
      position: static;
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .clipper-hint { margin: 0 16px 8px auto; }
    /* document-relative so it can rest beside the photo at the bottom of the
       stacked page (a fixed clipper can't follow below-the-fold content);
       top/left restore the stacked layout's own base spot over the desktop
       bottom/right one */
    .clipper-container { position: absolute; top: 190px; bottom: auto; left: calc(50vw - 30px); right: auto; }

    /* inline PDF embedding is unreliable on phones/tablets: hide the embed,
       lean on the Open / Download card affordances instead */
    .resume__embed { display: none; }
    .resume__pdf { padding-bottom: 22px; }

    /* stack the closing gallery on narrow screens */
    .about__gallery { grid-template-columns: 1fr; }
    .about__gallery .about__img { margin: 0 0 18px; }

    /* stack the highlights cards on narrow screens */
    .hl__grid { grid-template-columns: 1fr; }

    /* stack the Lucid scrappy/TRIS pair on narrow screens */
    .lucid__duo { grid-template-columns: 1fr; }

    /* shorter embedded BOM sheet on narrow screens */
    .electropuch__sheet-frame { height: 360px; }
  }
</style>
</head>
<body>

<div class="shell">

  <nav class="nav">
    <ul id="navList" role="tablist" aria-label="Sections">
      <li class="active" role="tab" tabindex="0" aria-selected="true" aria-controls="contentInner" data-tab="Highlights" data-slug="home">Highlights</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="About Me" data-slug="about">About Me</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="Resume" data-slug="resume">Resume</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="Lucid Motors" data-slug="lucid-motors">Lucid Motors</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="BYU Racing" data-slug="byu-racing">BYU Racing</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="SO-101 Robotic Arm" data-slug="so-101">SO-101 Robotic Arm</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="Power Supply MCP Server" data-slug="bk-psu-mcp">Power Supply MCP Server</li>
      <li role="tab" tabindex="-1" aria-selected="false" aria-controls="contentInner" data-tab="Retro Moped EV Conversion" data-slug="electropuch">Retro Moped EV Conversion</li>
    </ul>
  </nav>

  <main class="content">
    <div id="contentInner" role="tabpanel" tabindex="0">[ Welcome ]</div>
  </main>

  <aside class="right">
    <div class="name">Landon<br>McNeil</div>
    <div class="photo-area">
      <div class="clipper-hint" id="clipperHint">&#8226; drag the clippers onto the hair to shave<br>&#8226; scroll to resize<br>&#8226; circle handle rotates, square resizes</div>
      <span class="reset-link" id="resetLink">&#8634; reset</span>
      <div class="photo-wrapper" id="photoWrapper">
        <canvas id="photoCanvas" width="280" height="447"></canvas>
        <canvas id="shaveCanvas" width="280" height="447"></canvas>
      </div>
    </div>
  </aside>

</div>

<!-- ── Clipper ── -->
<div class="clipper-container" id="clipper">
  <div class="handle rotate-handle" id="rotateHandle"></div>
  <div class="handle resize-handle" id="resizeHandle"></div>
  <div class="teeth-marker" id="teethMarker"></div>
  <svg id="clipperSvg" width="60" height="150" viewBox="0 0 60 150" xmlns="http://www.w3.org/2000/svg">
    <!-- power cord trailing from the bottom end, curving out behind the teeth -->
    <path d="M 16 104 C 4 114, 14 132, 8 148" stroke="#333" stroke-width="3" fill="none"/>
    <!-- body (slight 3/4 taper, rounded top) -->
    <path d="M 14 12 Q 14 4 22 4 L 38 4 Q 46 4 46 12 L 44 102 Q 44 108 38 108 L 22 108 Q 16 108 16 102 Z" fill="#1a1a1a"/>
    <!-- highlight strip along top edge -->
    <path d="M 16 7 Q 18 5 22 5 L 38 5 Q 42 5 44 7 L 44 9 Q 42 6.5 38 6.5 L 22 6.5 Q 18 6.5 16 9 Z" fill="#3d3d3d"/>
    <!-- face panel -->
    <rect x="22" y="18" width="18" height="56" fill="#2e2e2e"/>
    <!-- power button -->
    <circle cx="31" cy="32" r="4" fill="#555"/>
    <!-- side grip lines -->
    <rect x="24" y="54" width="14" height="2" fill="#1f1f1f"/>
    <rect x="24" y="60" width="14" height="2" fill="#1f1f1f"/>
    <rect x="24" y="66" width="14" height="2" fill="#1f1f1f"/>
    <!-- blade housing at the bottom (business end) -->
    <rect x="16" y="106" width="28" height="6" fill="#2a2a2a"/>
    <!-- clipper teeth: row of 8 thin rects, 4px wide x 8px tall, facing down -->
    <rect x="12" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="17" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="22" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="27" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="32" y="112" width="4" height="8" fill="#4a4a4a"/>
    <rect x="37" y="112" width="4" height="8" fill="#4a4a4a"/>

  // Wire +/- zoom on the embedded BOM sheet. CSS-scales the iframe (transform)
  // while keeping its width/height at 100/scale % so the scaled content fills the
  // scrollable frame at every zoom level. Clamped to 50%–200% in 25% steps.
  function initElectroSheetZoom() {
    var wrap = document.querySelector('.electropuch__zoom');
    var iframe = document.querySelector('.electropuch__sheet');
    if (!wrap || !iframe) return;
    var label = wrap.querySelector('.electropuch__zoom-level');
    var out = wrap.querySelector('[data-zoom="out"]');
    var inn = wrap.querySelector('[data-zoom="in"]');
    var MIN = 0.5, MAX = 2, STEP = 0.25, scale = 1;
    function apply() {
      iframe.style.width = (100 / scale) + '%';
      iframe.style.height = (100 / scale) + '%';
      iframe.style.transform = 'scale(' + scale + ')';
      label.textContent = Math.round(scale * 100) + '%';
      out.disabled = scale <= MIN + 1e-9;
      inn.disabled = scale >= MAX - 1e-9;
    }
    wrap.addEventListener('click', function (e) {
      var btn = e.target.closest('.electropuch__zoom-btn');
      if (!btn) return;
      scale = Math.min(MAX, Math.max(MIN, scale + (btn.getAttribute('data-zoom') === 'in' ? STEP : -STEP)));
      apply();
    });
    apply();
  }

  // Click any .electropuch__expandable image to open it full-screen in the
  // lightbox overlay; click the overlay or press Escape to close. The Escape
  // listener is added on open and removed on close so nothing leaks across visits.
  function initElectroLightbox() {
    var box = document.getElementById('electroLightbox');
    if (!box) return;
    var boxImg = box.querySelector('img');
    function onKey(e) { if (e.key === 'Escape') close(); }
    function open(src, alt) {
      boxImg.src = src;
      boxImg.alt = alt || '';
      box.classList.add('is-open');
      box.setAttribute('aria-hidden', 'false');
      document.addEventListener('keydown', onKey);
    }
    function close() {
      box.classList.remove('is-open');
      box.setAttribute('aria-hidden', 'true');
      boxImg.removeAttribute('src');
      document.removeEventListener('keydown', onKey);
    }
    box.addEventListener('click', close);
    document.querySelectorAll('.electropuch__expandable').forEach(function (im) {
      im.addEventListener('click', function () { open(im.getAttribute('src'), im.getAttribute('alt')); });
    });
  }

  /* ── Looping YouTube segment (1:00–1:35) via the IFrame Player API ──
     A plain iframe can't loop a sub-segment, so we drive it with the API: seek
     back to 60s whenever playback passes 95s. Muted is required for autoplay. */
  var LUCID_VIDEO_ID = 'Axlrx3qoIic';
  var LUCID_VIDEO_WATCH = 'https://youtu.be/Axlrx3qoIic?t=60';
  var LUCID_SEG_START = 60, LUCID_SEG_END = 95;
  var lucidPlayer = null, lucidLoopTimer = null, lucidWatchdog = null, ytApiLoading = false;

  function destroyLucidVideo() {
    if (lucidLoopTimer) { clearInterval(lucidLoopTimer); lucidLoopTimer = null; }
    if (lucidWatchdog) { clearTimeout(lucidWatchdog); lucidWatchdog = null; }
    if (lucidPlayer) {
      try { lucidPlayer.destroy(); } catch (e) {}
      lucidPlayer = null;
    }
  }

  function createLucidPlayer() {
    var mount = document.getElementById('lucidVideoMount');
    if (!mount || !window.YT || !window.YT.Player) return;
    destroyLucidVideo();
    var cover = document.getElementById('lucidVideoCover');
    var started = false;
    lucidPlayer = new YT.Player(mount, {
      videoId: LUCID_VIDEO_ID,
      playerVars: {
        start: LUCID_SEG_START, autoplay: 1, mute: 1, controls: 1,
        playsinline: 1, modestbranding: 1, rel: 0
      },
      events: {
        onReady: function (e) {
          e.target.mute();
          e.target.seekTo(LUCID_SEG_START, true);
          e.target.playVideo();
          if (lucidLoopTimer) clearInterval(lucidLoopTimer);
          lucidLoopTimer = setInterval(function () {
            if (!lucidPlayer || !lucidPlayer.getCurrentTime) return;
            var t = lucidPlayer.getCurrentTime();
            if (t >= LUCID_SEG_END || t < LUCID_SEG_START - 1) {
              lucidPlayer.seekTo(LUCID_SEG_START, true);
            }
          }, 250);
        },
        onStateChange: function (e) {
          // PLAYING (1): the embed really works — uncover the inline player.
          if (e.data === 1) { started = true; if (cover) cover.style.display = 'none'; }
        }
        // No onError DOM swap: error 153 doesn't reliably fire onError anyway,
        // and the cover already hides YouTube's error box. The cover just stays.
      }
    });
    // Watchdog: if the clip never starts (e.g. embedding refused), stop the
    // retry loop. The cover link is already visible, so nothing else to do.
    if (lucidWatchdog) clearTimeout(lucidWatchdog);
    lucidWatchdog = setTimeout(function () {
      if (started) return;
      if (lucidLoopTimer) { clearInterval(lucidLoopTimer); lucidLoopTimer = null; }
    }, 6000);
  }

  function initLucidVideo() {
    if (window.YT && window.YT.Player) { createLucidPlayer(); return; }
    // API not ready yet: register a one-shot callback and inject the script once.
    var prev = window.onYouTubeIframeAPIReady;
    window.onYouTubeIframeAPIReady = function () {
      if (typeof prev === 'function') prev();
      createLucidPlayer();
    };
    if (!ytApiLoading) {
      ytApiLoading = true;
      var s = document.createElement('script');
      s.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    }
  }

  function activateTab(slug, animate) {
    if (!tabsBySlug[slug]) slug = DEFAULT_SLUG;
    if (slug === currentSlug) return;

    var li = tabsBySlug[slug];
    tabItems.forEach(function (n) {

      ? 'Landon McNeil'

        initByuVideos();
      } else if (slug === DEFAULT_SLUG) {

        contentInner.innerHTML = buildHighlightsHTML();
      } else {
        contentInner.classList.remove('resume-view');
        contentInner.textContent = '[ ' + tab + ' — content coming soon ]';
      }
      if (contentInner.parentElement) contentInner.parentElement.scrollTop = 0;
      contentInner.classList.add('fade-in');
      contentInner.style.opacity = '1';

      // Re-anchor the clipper beside the now-painted head photo on every page.
      // Each navigation is a fresh start: clear hasUserMoved so the clipper
      // always returns to the photo, even if the user dragged it on the previous
      // page (and so the post-load ResizeObserver/load re-anchors fire for the
      // new page's settling media). setTimeout(0) defers past this paint so the
      // new content has laid out (and, on first load, past the clipper's own
      // init). Skipped only if a drag is literally in progress.
      if (!drag) {
        hasUserMoved = false;
        setTimeout(positionClipperBesideHead, 0);
      }
    }

    if (animate === false) {
      paint();
    } else {
      contentInner.classList.remove('fade-in');

  // Clicks update the URL for deep-linking/back-button AND activate directly.
  // We can't rely on the hashchange event alone: embedded preview panels and
  // other sandboxed iframes often don't fire hashchange, which would leave every
  // non-Home tab dead (Home worked only because it activated directly). Calling
  // activateTab here is safe — it's idempotent (no-ops when slug is already
  // current), so the hashchange listener below just becomes a no-op when it fires.
  navList.addEventListener('click', function (e) {
    var li = e.target.closest('li');
    if (!li) return;
    var slug = li.dataset.slug;
    if (slug === currentSlug) return;
    if (slug === DEFAULT_SLUG) {
      // keep the URL clean for the default tab
      history.pushState(null, '', location.pathname + location.search);
    } else {
      // setting a hash that isn't an element id => no scroll jump
      location.hash = slug;
    }
    activateTab(slug, true);
  });

  // Roving-tabindex keyboard support across the tablist.
  navList.addEventListener('keydown', function (e) {
    var li = e.target.closest('li');
    if (!li) return;
    var idx = tabItems.indexOf(li);
    var next = null;
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') next = tabItems[(idx + 1) % tabItems.length];
    else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') next = tabItems[(idx - 1 + tabItems.length) % tabItems.length];
    else if (e.key === 'Home') next = tabItems[0];
    else if (e.key === 'End') next = tabItems[tabItems.length - 1];
    else if (e.key === 'Enter' || e.key === ' ') { li.click(); e.preventDefault(); return; }
    if (next) {
      e.preventDefault();
      next.focus();
    }
  });

  window.addEventListener('hashchange', function () {
    activateTab(slugFromHash(), true);
  });

  // First paint: honor a deep link, fall back to default. No animation so the
  // correct tab is up immediately with no flicker.
  activateTab(slugFromHash(), false);

  var hairOutline = [
    // outer edge: up the left side, over the crown, down the right side
    [96,174],[95,160],[95,140],[96,128],[98,116],[101,106],[105,98],[110,90],
    [116,84],[124,79],[133,75],[143,72],[153,71],[163,72],[172,75],[180,79],
    [188,84],[200,88],[210,94],[216,100],[220,107],[221,118],[222,130],[223,142],
    [224,154],[224,164],[223,172],[222,182],[220,192],[218,201],
    // inner edge: up the right sideburn, across the hairline, down the left sideburn
    // (dips lower on the left to cover the light-blond fringe at the temple)
    [208,201],[207,192],[206,184],[205,176],[203,165],[201,150],[198,133],[194,124],
    [189,118],[184,114],[178,111],
    [170,109],[160,108],[150,108],[142,109],[138,112],[132,118],[126,126],[120,133],
    [115,138],[112,148],[110,158],[108,166],[106,174]
  ];
  var shaveMask = new Path2D();
  shaveMask.moveTo(hairOutline[0][0], hairOutline[0][1]);
  for (var hp = 1; hp < hairOutline.length; hp++) {
    shaveMask.lineTo(hairOutline[hp][0], hairOutline[hp][1]);
  }
  shaveMask.closePath();
  shaveMask.ellipse(158, 206, 25, 9, 0, 0, Math.PI * 2);    // mustache

  // total shaveable pixel count, measured once for the shine threshold
  var maskArea = (function () {
    var m = document.createElement('canvas');
    m.width = shaveCanvas.width; m.height = shaveCanvas.height;
    var mc = m.getContext('2d');
    mc.fill(shaveMask);
    var d = mc.getImageData(0, 0, m.width, m.height).data;
    var n = 0;
    for (var i = 3; i < d.length; i += 4) if (d[i] > 0) n++;
    return n;
  })();

  /* ── completion state: clean shave + sparkle once the whole mask is filled ── */
  var SKIN = '#E9C4B2'; // sampled from the photo's forehead/temple
  var shaveComplete = false;
  var strokesSinceCheck = 0;

  function drawSparkle(cx, cy, R, color) {
    var i = R * 0.16; // concave waist of the 4-point star
    shaveCtx.beginPath();
    shaveCtx.moveTo(cx, cy - R);
    shaveCtx.quadraticCurveTo(cx + i, cy - i, cx + R, cy);
    shaveCtx.quadraticCurveTo(cx + i, cy + i, cx, cy + R);
    shaveCtx.quadraticCurveTo(cx - i, cy + i, cx - R, cy);
    shaveCtx.quadraticCurveTo(cx - i, cy - i, cx, cy - R);
    shaveCtx.fillStyle = color;
    shaveCtx.fill();
  }

  function finishShave() {
    // wipe the speckled strokes, lay down smooth skin over the whole mask
    shaveCtx.clearRect(0, 0, shaveCanvas.width, shaveCanvas.height);
    shaveCtx.save();
    shaveCtx.clip(shaveMask);
    shaveCtx.fillStyle = SKIN;
    shaveCtx.fillRect(0, 0, shaveCanvas.width, shaveCanvas.height);
    shaveCtx.restore();
    // gold shine sparkles on the crown
    drawSparkle(162, 92, 16, '#FFC83D');
    drawSparkle(190, 108, 8, '#FFC83D');
    shaveComplete = true;
  }

  function maybeFinishShave() {
    if (shaveComplete) return;
    strokesSinceCheck++;
    if (strokesSinceCheck < 15) return;
    strokesSinceCheck = 0;
    var data = shaveCtx.getImageData(0, 0, shaveCanvas.width, shaveCanvas.height).data;
    var painted = 0;
    for (var i = 3; i < data.length; i += 4) {
      if (data[i] > 0) painted++;
    }
    if (painted / maskArea > 0.92) finishShave();
  }

  var resetLink = document.getElementById('resetLink');

  function resetShave() {
    shaveCtx.clearRect(0, 0, shaveCanvas.width, shaveCanvas.height);
    shaveComplete = false;
    strokesSinceCheck = 0;
    resetLink.classList.remove('visible');
  }

  resetLink.addEventListener('click', resetShave);
  photoWrapper.addEventListener('dblclick', resetShave);

  /* ── shave stroke (WarioWare-style: skin base + stubble) ── */
  function shaveStamp(cx, cy, scale) {
    if (shaveComplete) return; // head is clean — nothing left to buzz
    var r = 10 * scale;

    if (shaveCtx.isPointInPath(shaveMask, cx, cy)) {
      resetLink.classList.add('visible'); // only once hair is actually shaved
    }
    shaveCtx.save();
    shaveCtx.clip(shaveMask); // strokes only land on hair / mustache

    // PASS 1 — skin base
    var jx = (Math.random() - 0.5) * 4;
    var jy = (Math.random() - 0.5) * 4;
    shaveCtx.globalCompositeOperation = 'source-over';
    shaveCtx.beginPath();
    shaveCtx.arc(cx + jx, cy + jy, r, 0, Math.PI * 2);
    shaveCtx.fillStyle = SKIN;
    shaveCtx.fill();

    // PASS 2 — stubble dots
    var dots = 12 + Math.floor(Math.random() * 5);
    shaveCtx.fillStyle = 'rgba(74, 55, 40, 0.45)';
    for (var i = 0; i < dots; i++) {
      var ang = Math.random() * Math.PI * 2;
      var dist = Math.sqrt(Math.random()) * r;
      var dr = 0.8 + Math.random() * 1.2;
      shaveCtx.beginPath();
      shaveCtx.arc(cx + Math.cos(ang) * dist, cy + Math.sin(ang) * dist, dr, 0, Math.PI * 2);
      shaveCtx.fill();
    }
    shaveCtx.restore();

    // PASS 3 — completion check (clean skin + sparkle, fires once)
    maybeFinishShave();
  }

  /* ════════ CLIPPER ════════ */
  var clipper = document.getElementById('clipper');
  var clipperSvg = document.getElementById('clipperSvg');
  var rotateHandle = document.getElementById('rotateHandle');
  var resizeHandle = document.getElementById('resizeHandle');
  var teethMarker = document.getElementById('teethMarker');

  var t = { x: 0, y: 0, angleDeg: 0, scale: 1 };

  /* hint disappears after the first interaction with the clipper */
  var hint = document.getElementById('clipperHint');
  function dismissHint() {
    if (hint) { hint.classList.add('hidden'); hint = null; }
  }
  clipper.addEventListener('pointerdown', dismissHint);
  clipper.addEventListener('wheel', dismissHint);

  function applyTransform() {
    clipper.style.transform =
      'translate(' + t.x + 'px, ' + t.y + 'px) rotate(' + t.angleDeg + 'deg) scale(' + t.scale + ')';
  }

  function clipperCenter() {
    var r = clipper.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  /* ── teeth contact point (transform-aware via marker element) ── */
  function teethPoint() {
    var r = teethMarker.getBoundingClientRect();
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }

  /* ── rest the clipper just left of the head on load ──
     Anchored to the live photo position so it never covers page content; the
     user only meets the clipper beside the picture. Derived from the measured
     teeth point so it stays correct regardless of the CSS base position
     (which differs between desktop and the mobile @media rule). */
  function positionClipperBesideHead() {
    // measure with the identity transform so teethPoint() reflects the CSS base
    t.x = 0; t.y = 0;
    applyTransform();

    var photo = photoWrapper.getBoundingClientRect();
    var teeth = teethPoint();
    var body = clipper.getBoundingClientRect();

    // desired teeth landing: just left of the head, at hair mid-height
    var GAP = 10;                         // breathing room from the photo edge
    var desiredX = photo.left - GAP;
    var desiredY = photo.top + 140;       // hair vertical midpoint within the photo

    t.x = desiredX - teeth.x;
    t.y = desiredY - teeth.y;
    applyTransform();

    // keep the clipper on-screen so it stays discoverable on short viewports
    var rect = clipper.getBoundingClientRect();
    var vw = document.documentElement.clientWidth;
    var vh = document.documentElement.clientHeight;
    var pad = 4;
    if (rect.left < pad)              t.x += pad - rect.left;
    if (rect.right > vw - pad)        t.x -= rect.right - (vw - pad);
    // On the stacked layout the photo lives below the fold, so the clipper is
    // meant to sit beside it down the page (it scrolls with the document there);
    // only clamp vertically into the viewport on the fixed desktop layout.
    if (!window.matchMedia('(max-width: 900px)').matches) {
      if (rect.top < pad)            t.y += pad - rect.top;
      if (rect.bottom > vh - pad)    t.y -= rect.bottom - (vh - pad);
    }
    applyTransform();
  }

  var prevTeeth = null;

  function setBuzzing(on) {
    clipperSvg.classList.toggle('buzzing', on);
  }

  function tryShave() {
    var pt = teethPoint();
    var wrap = photoWrapper.getBoundingClientRect();
    var inside = pt.x >= wrap.left && pt.x <= wrap.right &&
                 pt.y >= wrap.top && pt.y <= wrap.bottom;
    setBuzzing(inside);
    if (!inside) { prevTeeth = null; return; }

    // canvas pixel coords (canvas size === css size here)
    var cx = pt.x - wrap.left;
    var cy = pt.y - wrap.top;

    // interpolate from previous point so fast drags leave no gaps
    if (prevTeeth) {
      var dx = cx - prevTeeth.x, dy = cy - prevTeeth.y;
      var dist = Math.hypot(dx, dy);
      var steps = Math.max(1, Math.floor(dist / 6));
      for (var i = 1; i <= steps; i++) {
        shaveStamp(prevTeeth.x + dx * i / steps, prevTeeth.y + dy * i / steps, t.scale);
      }
    } else {
      shaveStamp(cx, cy, t.scale);
    }
    prevTeeth = { x: cx, y: cy };
  }

  /* ── translate (drag) ── */
  var drag = null; // { mode: 'move'|'rotate'|'scale', ... }
  var hasUserMoved = false; // once true, stop auto-anchoring to the head

  clipper.addEventListener('pointerdown', function () { hasUserMoved = true; });

  clipper.addEventListener('pointerdown', function (e) {
    if (e.target === rotateHandle || e.target === resizeHandle) return;
    e.preventDefault();
    drag = { mode: 'move', startX: e.clientX, startY: e.clientY, baseX: t.x, baseY: t.y };
    clipper.classList.add('dragging');
    prevTeeth = null;
  });

  rotateHandle.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    var c = clipperCenter();
    var startAngle = Math.atan2(e.clientY - c.y, e.clientX - c.x) * 180 / Math.PI;
    drag = { mode: 'rotate', center: c, startAngle: startAngle, baseAngle: t.angleDeg };
    clipper.classList.add('show-handles');
  });

  resizeHandle.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    var c = clipperCenter();
    var startDist = Math.hypot(e.clientX - c.x, e.clientY - c.y);
    drag = { mode: 'scale', center: c, startDist: Math.max(startDist, 1), baseScale: t.scale };
    clipper.classList.add('show-handles');
  });

  document.addEventListener('pointermove', function (e) {
    if (!drag) return;
    if (drag.mode === 'move') {
      t.x = drag.baseX + (e.clientX - drag.startX);
      t.y = drag.baseY + (e.clientY - drag.startY);
      applyTransform();
      tryShave();
    } else if (drag.mode === 'rotate') {
      var a = Math.atan2(e.clientY - drag.center.y, e.clientX - drag.center.x) * 180 / Math.PI;
      t.angleDeg = drag.baseAngle + (a - drag.startAngle);
      applyTransform();
    } else if (drag.mode === 'scale') {
      var d = Math.hypot(e.clientX - drag.center.x, e.clientY - drag.center.y);
      t.scale = Math.min(3.0, Math.max(0.4, drag.baseScale * (d / drag.startDist)));
      applyTransform();
    }
  });

  function endDrag() {
    if (!drag) return;
    drag = null;
    clipper.classList.remove('dragging', 'show-handles');
    setBuzzing(false);
    prevTeeth = null;
  }
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  /* ── scroll to resize ── */
  clipper.addEventListener('wheel', function (e) {
    e.preventDefault();
    hasUserMoved = true;
    var dir = e.deltaY > 0 ? -1 : 1;
    t.scale = Math.min(3.0, Math.max(0.4, t.scale + dir * 0.08));
    applyTransform();
  }, { passive: false });

  // first paint: anchor beside the head once layout has settled
  requestAnimationFrame(positionClipperBesideHead);

  // Re-anchor without yanking a clipper the user has grabbed. rAF-debounced so a
  // burst of layout changes collapses into one reposition per frame.
  var anchorPending = false;
  function reanchor() {
    if (hasUserMoved || drag || anchorPending) return;
    anchorPending = true;
    requestAnimationFrame(function () {
      anchorPending = false;
      if (!hasUserMoved && !drag) positionClipperBesideHead();
    });
  }

  // re-anchor on resize/orientation change, but never yank it from the user
  window.addEventListener('resize', reanchor);

  // Lazy-loaded media (videos, iframes, images) finish after first paint and
  // grow the page, pushing the bottom photo down — especially on the stacked
  // mobile layout. Without re-anchoring, the clipper stays pinned to the photo's
  // earlier, higher position and ends up stranded in empty space (only appearing
  // once a tap/scroll forces a reflow). Watch the document height settle and
  // re-anchor each time, plus once more after every resource has loaded.
  if ('ResizeObserver' in window) {
    new ResizeObserver(reanchor).observe(document.body);
  }
  window.addEventListener('load', reanchor);
})();
</script>
</body>
</html>
